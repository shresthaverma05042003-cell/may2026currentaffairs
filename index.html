const form = document.getElementById("quizForm");

// Dynamically render the questions
questions.forEach((item,index)=>{

let html=`<div class="question" id="qContainer${index}">
<p>${item.q}</p>
<div class="options">`;

item.options.forEach(opt=>{
if(item.type === "single"){
    html+=`
    <label>
    <input type="radio" name="q${index}" value="${opt}" onchange="checkInstantAnswer(${index})">
    ${opt}
    </label>`;
} else {
    html+=`
    <label>
    <input type="checkbox" name="q${index}" value="${opt}" onchange="checkInstantAnswer(${index})">
    ${opt}
    </label>`;
}
});

html+=`</div>
<div class="instant-feedback" id="feedback${index}"></div>
</div>`;
form.innerHTML+=html;
});

function arraysEqual(a,b){
a=[...a].sort();
b=[...b].sort();
return JSON.stringify(a)===JSON.stringify(b);
}

// Evaluate status right after interaction
function checkInstantAnswer(index) {
    const q = questions[index];
    const feedbackDiv = document.getElementById(`feedback${index}`);
    
    if (q.type === "single") {
        let selected = document.querySelector(`input[name="q${index}"]:checked`);
        if (selected) {
            if (selected.value === q.answer) {
                feedbackDiv.innerHTML = `<span class="correct">✔ Correct!</span>`;
            } else {
                feedbackDiv.innerHTML = `<span class="wrong">✘ Wrong | Correct Answer: ${q.answer}</span>`;
            }
        }
    } else {
        let selected = [...document.querySelectorAll(`input[name="q${index}"]:checked`)].map(x => x.value);
        if (selected.length === 0) {
            feedbackDiv.innerHTML = "";
            return;
        }
        if (arraysEqual(selected, q.answer)) {
            feedbackDiv.innerHTML = `<span class="correct">✔ Correct Combination matched!</span>`;
        } else {
            feedbackDiv.innerHTML = `<span class="wrong">✘ Combination incomplete or incorrect | Expected answers: ${q.answer.join(", ")}</span>`;
        }
    }
}

function fireResultConfetti() {
if (typeof confetti !== "function") return;
const end = Date.now() + 3000;

(function frame() {
    confetti({ particleCount: 8, angle: 60, spread: 70, origin: { x: 0 } });
    confetti({ particleCount: 8, angle: 120, spread: 70, origin: { x: 1 } });
    if (Date.now() < end) { requestAnimationFrame(frame); }
})();
}

function submitQuiz(){
let score=0;
let output="<h2>Final Summary Report</h2>";

questions.forEach((q,i)=>{
if(q.type === "single"){
    let selected=document.querySelector(`input[name="q${i}"]:checked`);
    if(selected && selected.value===q.answer){
        score++;
        output+=`<p class="correct">Q${i+1}: Correct ✔</p>`;
    } else {
        output+=`<p class="wrong">Q${i+1}: Wrong ✘ | Correct Answer: ${q.answer}</p>`;
    }
} else {
    let selected=[...document.querySelectorAll(`input[name="q${i}"]:checked`)].map(x=>x.value);
    if(arraysEqual(selected, q.answer)){
        score++;
        output+=`<p class="correct">Q${i+1}: Correct ✔</p>`;
    }else{
        output+=`<p class="wrong">Q${i+1}: Wrong ✘ | Correct Answer: ${q.answer.join(", ")}</p>`;
    }
}
});

let percentage=((score/questions.length)*100).toFixed(2);

output+=`
<hr>
<h2>Final Score: ${score}/${questions.length}</h2>
<h2>Percentage: ${percentage}%</h2>
`;

const result=document.getElementById("result");
result.style.display="block";
result.innerHTML=output;

fireResultConfetti();

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});
}
</script>
